<!DOCTYPE html>
<html>
<head>
    <title>Table Assignment</title>
    <style>
        table {
            width: 50%;
            border-collapse: collapse;
            margin: 20px 0;
        }
        th, td {
            border: 1px solid #333;
            padding: 8px;
            text-align: center;
        }
        th {
            background-color: #f2f2f2;
        }
    </style>
</head>
<body>

    <h2>Sample Data Table</h2>

    <table>
        <thead>
            <tr>
                <th>Name</th>
                <th>Age</th>
                <th>City</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>adarsh</td>
                <td>25</td>
                <td>suryapet</td>
            </tr>
            <tr>
                <td>Ajay</td>
                <td>30</td>
                <td>miiryalagudha</td>
            </tr>
            <tr>
                <td>madhu</td>
                <td>22</td>
                <td>khammam</td>
            </tr>
        </tbody>
    </table>

</body>
</html>
